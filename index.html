<html lang="eng">
    <style>
        * {
            color: white;
            background-color: grey;
        }
    </style>
    <body>
        <h1>DuProL.dev</h1>
        <p>Currently under work!</p>
        <div id="PAGE-DISPLAY"></div>
    </body>
    <script>
        let page_display = document.getElementById("PAGE-DISPLAY");
        
        function fetch_file(repoUrl, filename) {
            const rawUrl = `https://raw.githubusercontent.com/${repoUrl}/refs/heads/master/${filename}`;
        
            const xhr = new XMLHttpRequest();
            xhr.open("GET", rawUrl, false);
            xhr.responseType = "blob";
            xhr.send();
        
            if (xhr.status !== 200) {
                throw new Error("Failed to fetch file: " + xhr.statusText);
            }
        
            return xhr.response;
        }

        p = document.createChild("p");
        p.textContent = fetch_file("DarrenPapa/dpl", "README.md");
        page_display.appendChild(p);
    </script>
</html>

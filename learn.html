<html lang="en">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <body>
        <h1>DuProL.dev</h1>
        <p>Currently under work!</p>
        <a href="./index.html">Go back...</a>
        <h2 class="title">How to Program in DPL</h2>
        <div id="content"></div>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/marked@2.0.0/lib/marked.min.js"></script>

    <script>
        // GitHub raw file URL (replace with your file's raw URL)
        const url = 'https://raw.githubusercontent.com/DarrenPapa/dpl/refs/heads/master/README.md';
        
        // Fetch the file
        fetch(url)
          .then(response => response.text())
          .then(markdown => {
          
            const md = markdown.split("Most recent at top.", 2);
            // Render the markdown into HTML
            if (md[1]) {const htmlContent = marked(md[1]);
            document.getElementById('content').innerHTML = htmlContent;}
            else{const htmlContent = marked(md[0]);
            document.getElementById('content').innerHTML = htmlContent;}
        
            // Display the rendered content in a div (with ID 'content')
          })
          .catch(error => {
            alert(error);
            console.error('Error fetching the file:', error);
          });
    </script>
</html>
